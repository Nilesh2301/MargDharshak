<!DOCTYPE html>
<html>
<head>
    <title>Margdarshak</title>
</head>
<body>
    <h1>🚀 Margdarshak AI</h1>
    
    <input id="msg" placeholder="Ask something">
    <button onclick="send()">Send</button>

    <p id="res"></p>

    <script>
        async function send() {
            let msg = document.getElementById("msg").value;

            let res = await fetch(
                "https://margdharshakx.onrender.com/chat?message=" + msg,
                { method: "POST" }
            );

            let data = await res.json();
            document.getElementById("res").innerText = data.reply;
        }
    </script>
</body>
</html>
